<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRAY CAT'S JOURNEY HOME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'VT323', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            image-rendering: pixelated;
        }

        #game-container {
            background: #222;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(255,165,0,0.2);
            border: 4px solid #444;
        }

        #screen {
            width: 640px;
            height: 360px;
            position: relative;
            overflow: hidden;
            border: 4px solid #111;
            background: #000;
        }

        #bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 400%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.4) saturate(0.7);
            z-index: 0;
            transition: background-image 1s ease-in-out;
        }

        canvas { 
            position: relative;
            display: block; 
            z-index: 10;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 20px;
            width: calc(100% - 40px);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            font-size: 24px;
            color: #ffd700;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            z-index: 100;
        }

        .lives-container {
            display: flex;
            gap: 5px;
            background: rgba(0,0,0,0.4);
            padding: 4px 8px;
            border-radius: 20px;
        }

        .paw-icon { width: 20px; height: 20px; }

        #overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
            z-index: 50;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            user-select: none;
        }

        .btn {
            width: 60px;
            height: 60px;
            background: #333;
            border: 2px solid #666;
            border-radius: 12px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 0 #000;
        }

        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
        .btn-red { background: #b91c1c; border-color: #ef4444; }

        #dialogue-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ffd700;
            padding: 12px;
            color: #fff;
            font-size: 20px;
            display: none;
            z-index: 200;
            border-radius: 8px;
        }

        .choice-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 4px 8px;
            margin-top: 4px;
            background: #333;
            border: 1px solid #ffd700;
            cursor: pointer;
        }
        .choice-btn:hover { background: #444; }

        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        #challenge-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            border: 4px solid #ffd700;
            color: #ffd700;
            padding: 20px;
            text-align: center;
            font-size: 32px;
            display: none;
            z-index: 300;
            pointer-events: none;
            border-radius: 12px;
        }

        #ending-movie {
            position: absolute;
            inset: 0;
            background: #1a1a1a;
            z-index: 500;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .hand-anim {
            animation: pet-action 2s infinite ease-in-out;
            transform-origin: top center;
        }

        @keyframes pet-action {
            0%, 100% { transform: translate(0, 0) rotate(-5deg); }
            50% { transform: translate(40px, 10px) rotate(5deg); }
        }

        .purr-text {
            animation: float-up 3s infinite linear;
            opacity: 0;
        }
        @keyframes float-up {
            0% { transform: translateY(0); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }

        #game-over-screen {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 600;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="screen">
        <div id="bg-layer"></div>

        <div id="hud" class="hidden">
            <div class="flex flex-col gap-1">
                <div class="text-sm opacity-80 tracking-widest">9 LIVES</div>
                <div id="lives-paws" class="lives-container"></div>
            </div>
            <div class="flex flex-col items-center">
                <div class="text-xs opacity-70">MILK CHALLENGE</div>
                <div id="milk-counter" class="text-white font-bold text-2xl">0 / 3</div>
            </div>
            <div class="text-right">
                <div id="lvl-label">LVL: <span id="lvl-val">1</span></div>
                <div id="act-label" class="text-sm opacity-70">ACT 1: THE JUNGLE SCRIPT</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="640" height="360"></canvas>
        <div id="overlay"></div>
        <div id="challenge-popup">CHALLENGE COMPLETE!<br><span class="text-xl text-white">All Milk Collected</span></div>

        <!-- Ending Movie Layer -->
        <div id="ending-movie">
            <div class="relative w-full h-full flex flex-col items-center justify-center bg-orange-100">
                <div class="absolute inset-0 opacity-20" style="background-image: repeating-linear-gradient(90deg, transparent, transparent 40px, #000 41px);"></div>
                <div class="relative scale-150">
                    <svg width="200" height="150" viewBox="0 0 200 150">
                        <ellipse cx="100" cy="120" rx="80" ry="20" fill="#8d6e63" />
                        <ellipse cx="100" cy="115" rx="70" ry="15" fill="#a1887f" />
                        <g transform="translate(100, 100)">
                            <path d="M-40 0 Q-40 -30 0 -30 Q40 -30 40 0" fill="#f39c12" />
                            <circle cx="30" cy="-25" r="20" fill="#f39c12" />
                            <path d="M15 -40 L20 -55 L30 -42 Z" fill="#e67e22" />
                            <path d="M35 -42 L45 -55 L50 -40 Z" fill="#e67e22" />
                            <path d="M22 -25 Q30 -30 38 -25" stroke="black" fill="none" stroke-width="2" />
                            <path d="M-40 0 Q-60 -20 -40 -40" stroke="#e67e22" stroke-width="8" fill="none" stroke-linecap="round" />
                        </g>
                        <g class="hand-anim" transform="translate(110, 40)">
                            <path d="M0 0 Q10 20 30 20 Q50 20 50 0 L50 -60 L0 -60 Z" fill="#ffe0b2" />
                            <path d="M10 20 L10 35 M25 20 L25 38 M40 20 L40 35" stroke="#dbb589" stroke-width="4" stroke-linecap="round" />
                        </g>
                    </svg>
                    <div class="purr-text absolute top-0 left-0 text-orange-600 font-bold" style="left: 120px; animation-delay: 0s">purrr...</div>
                    <div class="purr-text absolute top-0 left-0 text-orange-600 font-bold" style="left: 140px; top: -20px; animation-delay: 1s">zZz</div>
                    <div class="purr-text absolute top-0 left-0 text-orange-600 font-bold" style="left: 100px; top: 10px; animation-delay: 2s">purrr...</div>
                </div>
                <div class="mt-24 z-10">
                    <h2 class="text-4xl text-orange-900 font-bold">FINALLY HOME</h2>
                    <p class="text-orange-800 text-xl">The journey is over.</p>
                    <button onclick="location.reload()" class="mt-8 px-6 py-2 bg-orange-800 text-white rounded-full hover:bg-orange-900 transition-colors">PLAY AGAIN</button>
                </div>
            </div>
        </div>

        <div id="game-over-screen">
            <h1 class="text-6xl text-red-600 mb-4">GAME OVER</h1>
            <p class="text-xl mb-8">All 9 lives have been spent.</p>
            <button onclick="location.reload()" class="px-8 py-3 bg-red-800 text-white rounded-lg hover:bg-red-900">RETRY FROM START</button>
        </div>

        <div id="dialogue-box">
            <div id="dialogue-text"></div>
            <div id="choices" class="mt-2"></div>
        </div>

        <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-black z-[300]">
            <h1 class="text-5xl font-bold mb-2 text-orange-500 italic">STRAY CAT</h1>
            <p class="text-xl mb-12 text-gray-400">THE LONG WALK HOME</p>
            <button onclick="initGame()" class="blink text-3xl text-white hover:text-orange-400">START JOURNEY</button>
            <p class="mt-4 text-xs text-gray-500">ARROWS to Move | SPACE to Jump</p>
        </div>
    </div>

    <div class="controls">
        <div class="flex gap-2">
            <button class="btn" onmousedown="input.left=true" onmouseup="input.left=false" ontouchstart="input.left=true" ontouchend="input.left=false">◀</button>
            <button class="btn" onmousedown="input.right=true" onmouseup="input.right=false" ontouchstart="input.right=true" ontouchend="input.right=false">▶</button>
        </div>
        <div class="flex gap-2 ml-auto">
            <button class="btn btn-red" onmousedown="jump()" ontouchstart="jump()">JUMP</button>
            <button class="btn btn-red" onclick="interact()">TALK</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const bgLayer = document.getElementById('bg-layer');
    const input = { left: false, right: false };

    const BG_IMAGES = {
        jungle: "https://images.unsplash.com/photo-1518495973542-4542c06a5843?auto=format&fit=crop&q=80&w=1200",
        urban: "https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&q=80&w=1200",
        home: "https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&q=80&w=1200"
    };

    let audioCtx = null;
    let musicInterval = null;
    const sounds = {
        play: (freq, type, duration, vol = 0.05, slide = 0) => {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            if (slide) osc.frequency.exponentialRampToValueAtTime(slide, audioCtx.currentTime + duration);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        },
        jump: () => sounds.play(300, 'square', 0.2, 0.03, 600),
        doubleJump: () => sounds.play(500, 'square', 0.15, 0.04, 1000),
        stomp: () => sounds.play(150, 'triangle', 0.1, 0.1),
        hurt: () => sounds.play(100, 'sawtooth', 0.4, 0.1, 40),
        collect: () => sounds.play(800, 'sine', 0.15, 0.05, 1200),
        victory: () => {
            sounds.play(600, 'square', 0.1, 0.05, 800);
            setTimeout(() => sounds.play(900, 'square', 0.3, 0.05, 1200), 100);
        }
    };

    function startMusic() {
        if (!audioCtx) return;
        let step = 0;
        const scales = {
            1: [261.63, 293.66, 329.63, 349.23, 392.00, 440.00], 
            2: [261.63, 277.18, 311.13, 349.23, 392.00, 415.30],
            3: [329.63, 392.00, 440.00, 493.88, 523.25, 587.33]
        };

        musicInterval = setInterval(() => {
            if (gameState !== 'PLAYING') return;
            const currentScale = scales[currentAct] || scales[1];
            const octaveShift = currentAct >= 2 ? 0.5 : 1;
            
            if (step % 4 === 0) {
                sounds.play(currentScale[0] / 4 * octaveShift, 'triangle', 0.4, 0.06);
            }
            if (step % 2 === 0 && Math.random() > 0.4) {
                const note = currentScale[Math.floor(Math.random() * currentScale.length)] * (Math.random() > 0.8 ? 2 : 1) * octaveShift;
                sounds.play(note, 'square', 0.2, 0.012);
            }
            step = (step + 1) % 16;
        }, 180);
    }

    let gameState = 'START';
    let currentAct = 1;
    let lives = 9;
    let milkCollected = 0;
    let cameraX = 0;
    let frameCount = 0;
    let invulnFrames = 0;

    const player = {
        x: 100, y: 200, w: 50, h: 40,
        vx: 0, vy: 0,
        acc: 0.6, friction: 0.85, maxSpeed: 5,
        jumpPower: -14, gravity: 0.7,
        grounded: false, canDoubleJump: false, isDoubleJumping: false, dir: 1
    };

    const levels = {
        1: {
            title: "ACT 1: THE JUNGLE SCRIPT",
            bgStyle: 'jungle',
            platforms: [
                {x: 0, y: 320, w: 1000, h: 40, type: 'grass'},
                {x: 1150, y: 320, w: 800, h: 40, type: 'grass'},
                {x: 2100, y: 320, w: 1000, h: 40, type: 'grass'},
                {x: 3300, y: 320, w: 3000, h: 40, type: 'grass'},
                {x: 400, y: 240, w: 200, h: 20, type: 'wood'},
                {x: 1400, y: 180, w: 300, h: 20, type: 'vine'},
                {x: 2400, y: 220, w: 300, h: 20, type: 'vine'},
                {x: 3500, y: 240, w: 400, h: 20, type: 'wood'},
                {x: 4800, y: 240, w: 300, h: 20, type: 'wood'}
            ],
            milk: [
                {x: 450, y: 180, collected: false},
                {x: 1550, y: 120, collected: false},
                {x: 3700, y: 180, collected: false}
            ],
            enemies: [
                {x: 600, y: 285, w: 40, h: 35, type: 'spider', range: 120, startX: 600, dir: 1, speed: 2.2, dead: false},
                {x: 1300, y: 285, w: 40, h: 30, type: 'mouse', range: 150, startX: 1300, dir: 1, speed: 3.5, dead: false},
                {x: 4000, y: 285, w: 40, h: 30, type: 'mouse', range: 300, startX: 4000, dir: 1, speed: 5, dead: false},
                {x: 5200, y: 285, w: 40, h: 30, type: 'mouse', range: 150, startX: 5200, dir: 1, speed: 4.5, dead: false}
            ],
            npc: {
                x: 5800, y: 320, name: 'ANCIENT GATE', text: "The jungle ends here. The concrete labyrinth awaits. Do you dare enter the City?", 
                isDoor: true,
                choices: [{text: "ENTER THE CITY", effect: () => loadLevel(2)}]
            }
        },
        2: { 
            title: "ACT 2: CITY STREETS", 
            bgStyle: 'urban', 
            platforms: [
                {x: 0, y: 320, w: 1200, h: 80, type: 'brick'},
                {x: 1400, y: 320, w: 1000, h: 80, type: 'brick'},
                {x: 2600, y: 320, w: 1200, h: 80, type: 'brick'},
                {x: 4000, y: 320, w: 2000, h: 80, type: 'brick'},
                {x: 400, y: 220, w: 150, h: 15, type: 'metal'},
                {x: 1500, y: 120, w: 300, h: 15, type: 'metal'},
                {x: 3400, y: 160, w: 200, h: 15, type: 'metal'},
                {x: 4600, y: 140, w: 200, h: 15, type: 'metal'}
            ],
            milk: [
                {x: 720, y: 100, collected: false},
                {x: 2100, y: 280, collected: false},
                {x: 4650, y: 80, collected: false}
            ],
            enemies: [
                {x: 500, y: 280, w: 60, h: 40, type: 'dog', range: 300, startX: 500, dir: 1, speed: 4.5, dead: false},
                {x: 800, y: 60, w: 35, h: 25, type: 'pigeon', range: 400, startX: 800, dir: 1, speed: 3.5, dead: false},
                {x: 1900, y: 80, w: 35, h: 25, type: 'pigeon', range: 300, startX: 1900, dir: 1, speed: 4.5, dead: false},
                {x: 3800, y: 280, w: 60, h: 40, type: 'dog', range: 300, startX: 3800, dir: -1, speed: 4, dead: false}
            ], 
            npc: {
                x: 5200, y: 320, name: 'HOME DOOR', text: 'You see a familiar light in the window upstairs... enter?', 
                isDoor: true, 
                choices: [{text: "GO INSIDE", effect: () => loadLevel(3)}]
            }
        },
        3: {
            title: "ACT 3: THE APARTMENT",
            bgStyle: 'home',
            platforms: [
                {x: 0, y: 320, w: 6000, h: 40, type: 'wood'},
                {x: 400, y: 240, w: 200, h: 20, type: 'shelf'},
                {x: 800, y: 160, w: 200, h: 20, type: 'shelf'},
                {x: 1200, y: 240, w: 300, h: 20, type: 'shelf'},
                {x: 1800, y: 120, w: 200, h: 20, type: 'shelf'},
                {x: 2300, y: 240, w: 400, h: 20, type: 'shelf'}
            ],
            milk: [
                {x: 850, y: 110, collected: false},
                {x: 1850, y: 70, collected: false},
                {x: 2500, y: 190, collected: false}
            ],
            enemies: [
                {x: 700, y: 285, w: 40, h: 35, type: 'spider', range: 120, startX: 700, dir: 1, speed: 4, dead: false},
                {x: 1500, y: 285, w: 40, h: 30, type: 'mouse', range: 500, startX: 1500, dir: 1, speed: 6, dead: false}
            ],
            npc: {
                x: 3000, y: 320, name: 'BED', text: 'Purrr... you are finally home. Time for a long nap.', 
                isDoor: true, 
                isEnd: true,
                choices: [{text: "REST", effect: () => triggerEnding()}]
            }
        }
    };

    function updateHUD() {
        const container = document.getElementById('lives-paws');
        container.innerHTML = '';
        for (let i = 0; i < 9; i++) {
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("viewBox", "0 0 24 24");
            svg.classList.add("paw-icon");
            svg.style.opacity = i < lives ? "1" : "0.1";
            svg.innerHTML = `<circle cx="12" cy="14" r="6" fill="#ffd700" /><circle cx="6" cy="7" r="3" fill="#ffd700" /><circle cx="12" cy="5" r="3" fill="#ffd700" /><circle cx="18" cy="7" r="3" fill="#ffd700" />`;
            container.appendChild(svg);
        }
        document.getElementById('lvl-val').innerText = currentAct;
        document.getElementById('milk-counter').innerText = `${milkCollected} / 3`;
    }

    function triggerEnding() {
        gameState = 'ENDING';
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('ending-movie').style.display = 'flex';
        sounds.victory();
    }

    function loadLevel(act) {
        currentAct = act;
        player.x = 100;
        player.y = 200;
        player.vx = 0;
        player.vy = 0;
        cameraX = 0;
        milkCollected = 0;
        levels[act].milk.forEach(m => m.collected = false);
        levels[act].enemies.forEach(e => e.dead = false);
        gameState = 'PLAYING';
        document.getElementById('act-label').innerText = levels[act].title;
        bgLayer.style.backgroundImage = `url(${BG_IMAGES[levels[act].bgStyle]})`;
        updateHUD();
    }

    function initGame() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startMusic();
        }
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('hud').classList.remove('hidden');
        loadLevel(1);
        requestAnimationFrame(gameLoop);
    }

    function jump() {
        if (gameState !== 'PLAYING') return;
        if (player.grounded) {
            player.vy = player.jumpPower;
            player.grounded = false;
            player.canDoubleJump = true;
            player.isDoubleJumping = false;
            sounds.jump();
        } else if (player.canDoubleJump) {
            player.vy = player.jumpPower * 0.9;
            player.canDoubleJump = false;
            player.isDoubleJumping = true;
            sounds.doubleJump();
        }
    }

    function interact() {
        const lv = levels[currentAct];
        if (Math.abs(player.x - lv.npc.x) < 120) showDialogue(lv.npc);
    }

    function showDialogue(npc) {
        gameState = 'DIALOGUE';
        const box = document.getElementById('dialogue-box');
        box.style.display = 'block';
        document.getElementById('dialogue-text').innerText = npc.name + ": " + npc.text;
        const choices = document.getElementById('choices');
        choices.innerHTML = '';
        npc.choices.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = c.text;
            btn.onclick = () => { box.style.display = 'none'; c.effect(); };
            choices.appendChild(btn);
        });
    }

    function takeDamage() {
        if (invulnFrames > 0) return;
        
        lives--;
        invulnFrames = 60; 
        sounds.hurt();
        updateHUD();

        if (lives <= 0) {
            gameState = 'GAMEOVER';
            document.getElementById('game-over-screen').style.display = 'flex';
        } else {
            player.vy = -8;
            player.vx = player.dir * -8;
        }
    }

    function update() {
        if (gameState !== 'PLAYING') return;
        if (invulnFrames > 0) invulnFrames--;

        if (input.left) player.vx -= player.acc;
        if (input.right) player.vx += player.acc;
        player.vx *= player.friction;
        player.vy += player.gravity;
        player.x += player.vx;
        player.y += player.vy;

        if (player.vx > 0.5) player.dir = 1;
        if (player.vx < -0.5) player.dir = -1;

        if (player.y > canvas.height + 100) {
            takeDamage();
            if (lives > 0) {
                player.y = 0; 
                player.vy = 0;
                player.x = Math.max(0, player.x - 200);
            }
        }

        player.grounded = false;
        const currentLvl = levels[currentAct];
        
        currentLvl.platforms.forEach(p => {
            if (player.x + player.w > p.x && player.x < p.x + p.w &&
                player.y + player.h >= p.y && player.y + player.h <= p.y + player.vy + 10 &&
                player.vy >= 0) {
                player.y = p.y - player.h;
                player.vy = 0;
                player.grounded = true;
                player.canDoubleJump = false;
                player.isDoubleJumping = false;
            }
        });

        currentLvl.enemies.forEach(e => {
            if (e.dead) return;
            e.x += e.speed * e.dir;
            if (Math.abs(e.x - e.startX) > e.range) e.dir *= -1;
            
            if (player.x < e.x + e.w && player.x + player.w > e.x &&
                player.y < e.y + e.h && player.y + player.h > e.y) {
                if (player.vy > 1 && player.y + player.h < e.y + 20) {
                    e.dead = true;
                    player.vy = -12;
                    player.canDoubleJump = true; 
                    sounds.stomp();
                } else {
                    takeDamage();
                }
            }
        });

        currentLvl.milk.forEach(m => {
            if (!m.collected) {
                if (player.x < m.x + 30 && player.x + player.w > m.x &&
                    player.y < m.y + 40 && player.y + player.h > m.y) {
                    m.collected = true;
                    milkCollected++;
                    sounds.collect();
                    updateHUD();
                    if (milkCollected === 3) {
                        sounds.victory();
                        const popup = document.getElementById('challenge-popup');
                        popup.style.display = 'block';
                        setTimeout(() => popup.style.display = 'none', 3000);
                    }
                }
            }
        });

        cameraX += (player.x - 240 - cameraX) * 0.1;
        if (cameraX < 0) cameraX = 0;
        bgLayer.style.transform = `translateX(${-cameraX * 0.5}px)`;
        frameCount++;
    }

    function drawCat(ctx, px, py, dir, grounded) {
        if (invulnFrames > 0 && Math.floor(frameCount / 4) % 2 === 0) return;
        ctx.save();
        ctx.translate(px + player.w/2, py + player.h/2);
        if (dir === -1) ctx.scale(-1, 1);
        if (player.isDoubleJumping) ctx.rotate(frameCount * 0.4 * dir);

        let walkCycle = grounded && Math.abs(player.vx) > 0.5 ? Math.sin(frameCount * 0.2) * 2 : 0;
        
        // Tail
        ctx.strokeStyle = '#e67e22'; ctx.lineWidth = 4; ctx.beginPath();
        ctx.moveTo(-22, 0); ctx.quadraticCurveTo(-40, -10 + Math.sin(frameCount*0.1)*10, -45, 0); ctx.stroke();
        
        // Legs
        ctx.fillStyle = '#e67e22';
        let legOffset = grounded && Math.abs(player.vx) > 0.5 ? Math.sin(frameCount * 0.4) * 8 : 0;
        ctx.fillRect(-18 + legOffset, 10, 8, 14); ctx.fillRect(8 - legOffset, 10, 8, 14);
        
        // Body
        ctx.fillStyle = '#f39c12'; ctx.beginPath(); ctx.roundRect(-25, -15, 50, 30, 12); ctx.fill();
        
        // Head
        ctx.save(); ctx.translate(18, -12 + walkCycle);
        // Ears
        ctx.fillStyle = '#e67e22'; ctx.beginPath(); ctx.moveTo(-12, -10); ctx.lineTo(-18, -28); ctx.lineTo(-2, -14); ctx.fill();
        ctx.beginPath(); ctx.moveTo(4, -14); ctx.lineTo(12, -28); ctx.lineTo(14, -10); ctx.fill();
        // Face
        ctx.fillStyle = '#f39c12'; ctx.beginPath(); ctx.roundRect(-16, -16, 32, 28, 10); ctx.fill();
        // Eyes
        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(-6, -4, 4, 0, 6.28); ctx.fill(); ctx.beginPath(); ctx.arc(8, -4, 4, 0, 6.28); ctx.fill();
        ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(-6, -4, 2, 0, 6.28); ctx.fill(); ctx.beginPath(); ctx.arc(8, -4, 2, 0, 6.28); ctx.fill();
        ctx.restore(); ctx.restore();
    }

    function drawEnemy(ctx, e) {
        if (e.dead) return;
        ctx.save(); ctx.translate(e.x + e.w/2, e.y + e.h/2);
        if (e.dir === 1) ctx.scale(-1, 1);
        if (e.type === 'spider') {
            ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(0, 0, 12, 0, 6.28); ctx.fill();
            ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(-4, -4, 2, 0, 6.28); ctx.fill(); ctx.beginPath(); ctx.arc(4, -4, 2, 0, 6.28); ctx.fill();
            ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
            for (let i = 0; i < 4; i++) {
                let angle = (i * 0.4) + Math.sin(frameCount * 0.2) * 0.2;
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(Math.cos(angle) * 20, Math.sin(angle) * 20); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-Math.cos(angle) * 20, Math.sin(angle) * 20); ctx.stroke();
            }
        } else if (e.type === 'mouse') {
            ctx.strokeStyle = '#999'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(12, 4); 
            ctx.quadraticCurveTo(25, -5 + Math.sin(frameCount*0.3)*10, 35, 4); ctx.stroke();
            ctx.fillStyle = '#777'; ctx.beginPath(); ctx.ellipse(0, 4, 15, 10, 0, 0, 6.28); ctx.fill();
            ctx.beginPath(); ctx.ellipse(-12, 0, 10, 8, 0, 0, 6.28); ctx.fill();
            ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(-16, -2, 2, 0, 6.28); ctx.fill();
        } else if (e.type === 'dog') {
            ctx.fillStyle = '#6d4c41'; ctx.beginPath(); ctx.roundRect(-30, -10, 60, 30, 8); ctx.fill();
            ctx.fillStyle = '#5d4037'; ctx.beginPath(); ctx.roundRect(-42, -25, 25, 25, 8); ctx.fill();
            ctx.save(); ctx.translate(28, 0); ctx.rotate(Math.sin(frameCount * 0.3) * 0.5);
            ctx.fillStyle = '#5d4037'; ctx.beginPath(); ctx.roundRect(0, -5, 20, 8, 4); ctx.fill(); ctx.restore();
            let walk = Math.sin(frameCount * 0.3) * 5; ctx.fillRect(-20 + walk, 15, 10, 15); ctx.fillRect(10 - walk, 15, 10, 15);
        } else if (e.type === 'pigeon') {
            let wing = Math.sin(frameCount * 0.6) * 15;
            ctx.fillStyle = '#78909c'; ctx.beginPath(); ctx.ellipse(0, 0, 18, 12, 0, 0, 6.28); ctx.fill();
            ctx.fillStyle = '#546e7a'; ctx.beginPath(); ctx.arc(-15, -8, 8, 0, 6.28); ctx.fill();
            ctx.fillStyle = '#455a64'; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-12, -15 - wing); ctx.lineTo(15, -10 - wing); ctx.fill();
        }
        ctx.restore();
    }

    function drawMilk(ctx, m) {
        if (m.collected) return;
        ctx.save();
        let bob = Math.sin(frameCount * 0.1) * 8;
        ctx.translate(m.x, m.y + bob);
        ctx.fillStyle = '#eee'; ctx.beginPath(); ctx.roundRect(0, 0, 24, 35, 4); ctx.fill();
        ctx.fillStyle = '#2196f3'; ctx.fillRect(0, 15, 24, 8);
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.roundRect(4, -6, 16, 8, 2); ctx.fill();
        ctx.restore();
    }

    function drawDoor(ctx, x, y, isEnd) {
        ctx.save();
        ctx.translate(x, y);
        if (isEnd) {
            // Dog bed / Bed
            ctx.fillStyle = '#5d4037'; ctx.fillRect(-45, -20, 90, 20);
            ctx.fillStyle = '#a1887f'; ctx.beginPath(); ctx.ellipse(0, -20, 45, 15, 0, 0, 6.28); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.fillRect(-35, -35, 30, 15);
        } else {
            // Doorway
            ctx.fillStyle = '#444'; ctx.beginPath(); ctx.roundRect(-40, -100, 80, 100, 10); ctx.fill();
            let pulse = Math.sin(frameCount * 0.05) * 0.2 + 0.8;
            ctx.fillStyle = `rgba(255, 165, 0, ${pulse})`;
            ctx.beginPath(); ctx.roundRect(-30, -90, 60, 90, 8); ctx.fill();
            ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.arc(20, -50, 4, 0, 6.28); ctx.fill();
        }
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (gameState === 'ENDING' || gameState === 'GAMEOVER') return;
        
        const lv = levels[currentAct];
        ctx.save();
        ctx.translate(-cameraX, 0);
        
        // Platforms
        lv.platforms.forEach(p => {
            if (p.type === 'grass') ctx.fillStyle = '#4daa3d';
            else if (p.type === 'vine') ctx.fillStyle = '#2d5a27';
            else if (p.type === 'brick') ctx.fillStyle = '#3d2b1f';
            else if (p.type === 'metal') ctx.fillStyle = '#444';
            else if (p.type === 'shelf') ctx.fillStyle = '#8d6e63';
            else ctx.fillStyle = '#5d4037'; 
            ctx.fillRect(p.x, p.y, p.w, p.h);
        });

        // Interactive Door/Gate
        drawDoor(ctx, lv.npc.x, lv.npc.y, lv.npc.isEnd);

        // Milk Collectibles
        lv.milk.forEach(m => drawMilk(ctx, m));

        // Enemies
        lv.enemies.forEach(e => drawEnemy(ctx, e));

        // Player
        drawCat(ctx, player.x, player.y, player.dir, player.grounded);

        // Interaction Indicator
        if (Math.abs(player.x - lv.npc.x) < 120) {
            ctx.fillStyle = 'white';
            ctx.font = '24px VT323';
            ctx.textAlign = 'center';
            let bob = Math.sin(frameCount * 0.1) * 5;
            ctx.fillText('TALK/ENTER [E]', lv.npc.x, lv.npc.y - 120 + bob);
        }

        ctx.restore();
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // Input handling for Keyboard
    window.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') input.left = true;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') input.right = true;
        if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') jump();
        if (e.code === 'KeyE' || e.code === 'Enter') interact();
    });

    window.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') input.left = false;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') input.right = false;
    });

    // Draw the initial background before pressing Start
    bgLayer.style.backgroundImage = `url(${BG_IMAGES['jungle']})`;

</script>
</body>
